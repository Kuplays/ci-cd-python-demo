name: CI

on:
  push:
        branches: [main]
  pull_request:
  
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "unit"
        type: choice
        options:
          - unit
          - smoke
          - full
      
      publish_report:
        description: "Publish Allure report to GH"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-info:
    runs-on: ubuntu-latest

    steps:
      - name: Print run params
        run: |
              echo "Event name ${{ github.event_name }}"
              echo "Suite: ${{ inputs.suite }}"
              echo "Publish report: ${{ inputs.publish_report }}"

  lint:
    needs: run-info
    runs-on: ubuntu-latest

    steps:
      - name:   Checkout repository
        uses:   actions/checkout@v5

      - name:   Set python
        uses:   actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: "pip"

      - name:   Install dependencies
        run:    |
                python -m pip install --upgrade pip
                pip install -r requirements-dev.txt

      - name:   Run ruff
        run:    ruff check .

      - name:   Format checking with Black
        run:    black --check .

  tests:
    needs:    lint
    runs-on:  ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
            
      - name: Install dependencies
        run: |
              python -m pip install --upgrade pip
              pip install -r requirements-dev.txt
            
      - name: Run tests
        run: |
              if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                echo "Manual run selected suite: ${{ inputs.suite }}"
              else
                echo "Auto run, default: full"
              fi
              pytest --junitxml=reports/junit.xml --alluredir=allure-results --clean-alluredir

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v6
        with: 
          name: pytest-report-py${{ matrix.python-version }}
          path: reports/
            
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-py${{ matrix.python-version }}
          path: allure-results/

  allure-report:
    needs: tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download Allure results from Python 3.12
        uses: actions/download-artifact@v6
        with:
          name: allure-results-py3.12
          path: allure-results

      - name: Setup Java
        if: always()
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
            
      - name: Install Allure CLI
        if: always()
        run: |
              wget -q https://github.com/allure-framework/allure2/releases/download/2.35.1/allure-2.35.1.tgz
              tar -zxvf allure-2.35.1.tgz
              sudo mv allure-2.35.1 /opt/allure
              sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
              allure --version

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-html-report
          path: allure-report/
            
      - name: Upload Github Pages artifact
        if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || inputs.publish_report)
        uses: actions/upload-pages-artifact@v5
        with:
          path: allure-report

  deploy-pages:
    needs: allure-report
    if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || inputs.publish_report)
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Deploy Allure report to GH Pages
        id: deployment
        uses: actions/deploy-pages@v4