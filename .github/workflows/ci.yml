name: CI

on:
  push:
    branches: [main]

  pull_request:

  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "unit"
        type: choice
        options:
          - unit
          - smoke
          - full

      publish_report:
        description: "Publish Allure report to GitHub Pages"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-info:
    runs-on: ubuntu-latest

    steps:
      - name: Print run parameters
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Suite: ${{ inputs.suite }}"
          echo "Publish report: ${{ inputs.publish_report }}"

  lint:
    needs: run-info
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Check formatting with Black
        run: black --check .

  unit-tests:
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          pytest tests/unit \
            --junitxml=reports/unit-junit.xml \
            --alluredir=allure-results \
            --clean-alluredir

      - name: Upload unit pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-pytest-report-py${{ matrix.python-version }}
          path: reports/

      - name: Upload unit Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-unit-py${{ matrix.python-version }}
          path: allure-results/

  smoke-tests:
    needs: unit-tests
    if: github.event_name != 'workflow_dispatch' || inputs.suite == 'smoke' || inputs.suite == 'full'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run smoke tests
        run: |
          pytest tests/smoke \
            --junitxml=reports/smoke-junit.xml \
            --alluredir=allure-results \
            --clean-alluredir

      - name: Upload smoke pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-pytest-report
          path: reports/

      - name: Upload smoke Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results/

  full-tests:
    needs: smoke-tests
    if: github.event_name == 'workflow_dispatch' && inputs.suite == 'full'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run full tests
        run: |
          pytest tests \
            --junitxml=reports/full-junit.xml \
            --alluredir=allure-results \
            --clean-alluredir

      - name: Upload full pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-pytest-report
          path: reports/

      - name: Upload full Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-full
          path: allure-results/

  allure-report:
    needs: [unit-tests, smoke-tests, full-tests]
    if: |
      always() &&
      (
        needs.unit-tests.result == 'success' ||
        needs.unit-tests.result == 'failure' ||
        needs.smoke-tests.result == 'success' ||
        needs.smoke-tests.result == 'failure' ||
        needs.full-tests.result == 'success' ||
        needs.full-tests.result == 'failure'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v6
        with:
          pattern: allure-results-*
          path: allure-results/
          merge-multiple: true

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.44.0/allure-2.44.0.tgz
          tar -zxvf allure-2.44.0.tgz
          sudo mv allure-2.44.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Generate Allure HTML report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: allure-report/

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || inputs.publish_report)
        uses: actions/upload-pages-artifact@v5
        with:
          path: allure-report/

  deploy-pages:
    needs: allure-report
    if: github.ref == 'refs/heads/main' && needs.allure-report.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.publish_report)
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4