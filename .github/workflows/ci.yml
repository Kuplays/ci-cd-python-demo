name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
    tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Set python
              uses: actions/setup-python@v6
              with:
                python-version: "3.10"
                cache: "pip"
            
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements-dev.txt

            - name: Run ruff
              run: ruff check .

            - name: Run black check
              run: black --check .
            
            - name: Run tests
              run: pytest --junitxml=reports/junit.xml --alluredir=allure-results --clean-alluredir

            - name: Setup Java
              if: always()
              uses: actions/setup-java@v5
              with:
                distribution: temurin
                java-version: "21"
            
            - name: Install Allure CLI
              if: always()
              run: |
                wget -q https://github.com/allure-framework/allure2/releases/download/2.35.1/allure-2.35.1.tgz
                tar -zxvf allure-2.35.1.tgz
                sudo mv allure-2.35.1 /opt/allure
                sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
                allure --version

            - name: Generate Allure report
              if: always()
              run: allure generate allure-results --clean -o allure-report

            - name: Upload pytest report
              if: always()
              uses: actions/upload-artifact@v6
              with: 
                name: pytest-report
                path: reports/
            
            - name: Upload Allure results
              if: always()
              uses: actions/upload-artifact@v6
              with:
                name: allure-results
                path: allure-results/

            - name: Upload Allure HTML report
              if: always()
              uses: actions/upload-artifact@v6
              with:
                name: allure-html-report
                path: allure-report
            
            - name: Upload Github Pages artifact
              if: github.ref == 'refs/heads/main'
              uses: actions/upload-pages-artifact@v5
              with:
                path: allure-report

    deploy-pages:
      if: github.ref == 'refs/heads/main'
      needs: tests
      runs-on: ubuntu-latest

      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      
      steps:
        - name: Deploy Allure report to GH Pages
          id: deployment
          uses: actions/deploy-pages@b4