name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Set python
              uses: actions/setup-python@v6
              with:
                python-version: "3.12"
            
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements-dev.txt
            
            - name: Run tests
              run: pytest